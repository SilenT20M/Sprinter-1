<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Secure Retail System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">🛒 Secure Retail</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Contact Us</h1>
        <p>Get in touch with the Secure Retail System team</p>
    </div>

    <div class="section">
        <h2>Send Us a Message</h2>
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email address">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="Type your message here..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer>
        <p><span>Group 5</span> — Rahul | Nishant | Sujan | Sandesh &nbsp;|&nbsp; Capstone A &nbsp;|&nbsp; Secure Retail System</p>
    </footer>

</body>
</html>
