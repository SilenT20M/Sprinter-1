<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Secure Retail System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">🛒 Secure<span>Retail</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</div>

<div class="page-hero">
  <h1>Contact Us</h1>
  <p>Get in touch with the Secure Retail System team</p>
</div>

<div class="section">
  <div class="form-wrap">
    <div class="section-label">Send a Message</div>
    <h2 style="margin-bottom:28px">We'd love to hear from you</h2>
    <form>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email">
        </div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Type your message here..."></textarea>
      </div>
      <button type="submit" class="submit-btn" onclick="handleSubmit(event)">Send Message</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-logo">🛒 Secure<span>Retail</span></div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
  <div class="footer-bottom">
    Group 5 — Rahul &nbsp;|&nbsp; Nishant &nbsp;|&nbsp; Sujan &nbsp;|&nbsp; Sandesh &nbsp;·&nbsp; Capstone A
  </div>
</footer>

<script>
function toggleMenu(){
  document.getElementById('mobileMenu').classList.toggle('open');
}
function handleSubmit(e){
  e.preventDefault();
  const btn=document.querySelector('.submit-btn');
  btn.textContent='✓ Message Sent!';
  btn.style.background='#1E6B3C';
  setTimeout(()=>{btn.textContent='Send Message';btn.style.background=''},3000);
}
</script>
</body>
</html>
